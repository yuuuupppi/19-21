<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App / Зиберева А.А.</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .completed .task-text {
            text-decoration: line-through;
            opacity: 0.6;
        }
        .filter-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    
    <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 px-6 py-4">
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                <i class="fas fa-check-circle"></i>
                Планировщик задач
            </h1>
            <p class="text-blue-100 text-sm mt-1">Управляй своими делами эффективно</p>
        </div>
        
        <div class="p-6">
            <!-- Форма добавления задачи -->
            <form id="taskForm" class="flex flex-col sm:flex-row gap-3 mb-6">
                <input type="text" id="taskInput" placeholder="Что нужно сделать?" 
                       class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <select id="prioritySelect" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="low">Низкий</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                </select>
                
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition flex items-center justify-center gap-2">
                    <i class="fas fa-plus"></i> Добавить
                </button>
            </form>
            
            <!-- Фильтры задач -->
            <div id="filterContainer" class="flex gap-2 mb-4 border-b border-gray-200 pb-2">
                <button class="filter-btn px-4 py-1 rounded-full border border-gray-300 hover:bg-gray-100 transition" data-filter="all">Все</button>
                <button class="filter-btn px-4 py-1 rounded-full border border-gray-300 hover:bg-gray-100 transition" data-filter="active">Активные</button>
                <button class="filter-btn px-4 py-1 rounded-full border border-gray-300 hover:bg-gray-100 transition" data-filter="completed">Выполненные</button>
            </div>
            
            <!-- Список задач -->
            <ul id="taskList" class="space-y-2 mb-4 max-h-96 overflow-y-auto"></ul>
            
            <!-- Нижняя панель -->
            <div class="flex flex-wrap items-center justify-between gap-3 pt-4 border-t border-gray-200 text-sm text-gray-600">
                <div id="stats">
                    Выполнено: <span id="completedCount">0</span> / <span id="totalCount">0</span>
                </div>
                
                <div class="flex gap-2">
                    <button id="loadFromServerBtn" class="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded transition flex items-center gap-1">
                        <i class="fas fa-cloud-download-alt"></i> Загрузить с сервера
                    </button>
                    <button id="clearCompletedBtn" class="bg-gray-100 hover:bg-gray-200 px-3 py-1 rounded transition flex items-center gap-1">
                        <i class="fas fa-trash-alt"></i> Удалить выполненные
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Подключаем главный модуль -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
